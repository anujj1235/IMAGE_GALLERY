<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Image Gallery | CodeAlpha Task 1</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <h1>📸 My Image Gallery</h1>
        <p>Explore beautiful moments | Hover for effects | Click to enlarge</p>
    </header>

    <!-- Category Filters (BONUS FEATURE) -->
    <div class="categories">
        <button class="category-btn active" data-category="all">All Photos</button>
        <button class="category-btn" data-category="nature">🌄 Nature</button>
        <button class="category-btn" data-category="city">🌆 City</button>
        <button class="category-btn" data-category="people">👥 People</button>
        <button class="category-btn" data-category="animals">🐾 Animals</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Images will be inserted by JavaScript -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <button class="nav-btn prev-btn" id="prevBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <img src="" alt="Lightbox Image" id="lightboxImg">
            <button class="nav-btn next-btn" id="nextBtn">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div class="image-info" id="imageInfo">
                <span id="imageTitle"></span>
                <span id="imageCounter"></span>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 Image Gallery | Built with <i class="fas fa-heart"></i> for CodeAlpha Internship</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
